<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Portfolio | วรเชฏฐ์ ชาทอน</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Segoe UI",sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ffffff,#f4f6f8,#e9edf2);
}

.container{
    width:90%;
    max-width:600px;
    background:white;
    text-align:center;
    padding:50px;
    border-radius:25px;
    box-shadow:0 15px 40px rgba(0,0,0,0.12);
}

img{
    width:180px;
    height:180px;
    border-radius:50%;
    object-fit:cover;
    border:6px solid #f1f1f1;
    box-shadow:0 8px 20px rgba(0,0,0,0.15);
    margin-bottom:25px;
    transition:.3s;
}

img:hover{
    transform:scale(1.05);
}

h1{
    color:#333;
    font-size:40px;
    margin-bottom:10px;
}

h2{
    color:#777;
    font-weight:400;
    margin-bottom:25px;
}

p{
    color:#666;
    font-size:20px;
    margin:10px 0;
}

.btn{
    display:inline-block;
    margin-top:30px;
    padding:14px 35px;
    background:#6b7280;
    color:white;
    text-decoration:none;
    border-radius:40px;
    font-size:18px;
    transition:.3s;
}

.btn:hover{
    background:#4b5563;
    transform:translateY(-3px);
    box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

</style>

</head>

<body>

<div class="container">

<img src="images/profile.jpg" alt="รูปภาพ">

<h1>วรเชฏฐ์ ชาทอน</h1>

<h2>Portfolio Website</h2>

<p>🎓 นักเรียนชั้น ม.6/1</p>

<p>🏫 โรงเรียนพานทอง</p>

<p>✨ ยินดีต้อนรับเข้าสู่เว็บไซต์ Portfolio ของผม</p>

<a href="#" class="btn">เข้าสู่เว็บไซต์</a>

</div>

</body>
</html>
